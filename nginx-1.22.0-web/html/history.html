<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI面试助手 - 历史记录</title>
    <style>
        :root {
            --bg: #f6f7fb;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --border: #e5e7eb;
            --primary: #6366f1;
            --primary-600: #4f46e5;
            --shadow: 0 10px 30px rgba(17, 24, 39, 0.08);
            --radius: 14px;
            --font: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            color: var(--text);
            background: radial-gradient(1200px 600px at 15% 0%, #eef2ff 0%, transparent 60%),
                        radial-gradient(1200px 600px at 85% 10%, #fce7f3 0%, transparent 55%),
                        var(--bg);
            font-family: var(--font);
        }

        body, h1, a, p, button, input {
            font-family: var(--font);
        }

        .navbar {
            background: linear-gradient(135deg, #6d28d9 0%, #4f46e5 40%, #2563eb 100%);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            padding: 14px 16px;
            align-items: center;
        }
        .navbar h1 {
            margin: 0;
            font-weight: 800;
            color: white;
            letter-spacing: 0.5px;
            font-size: 18px;
        }
        .navbar .nav-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .navbar a {
            color: rgba(255, 255, 255, 0.95);
            text-decoration: none;
            padding: 8px 10px;
            border-radius: 10px;
            font-weight: 600;
        }
        .navbar a:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        #container {
            max-width: 1100px;
            width: calc(100% - 32px);
            margin: 18px auto;
        }

        .page-title {
            margin: 16px 2px 6px;
            font-size: 16px;
            color: var(--muted);
        }

        .search-bar {
            margin-top: 12px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 12px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .search-input {
            flex: 1 1 260px;
            min-width: 220px;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            outline: none;
            background: #fff;
            color: var(--text);
        }
        .search-input:focus {
            border-color: rgba(99, 102, 241, 0.55);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.14);
        }
        .search-btn {
            padding: 10px 14px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid var(--border);
            background: #fafafa;
            color: var(--muted);
        }
        .search-btn:hover {
            background: #f3f4f6;
            color: var(--text);
        }

        .card-list {
            margin-top: 18px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .qa-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .qa-card .card-content {
            color: var(--text);
            line-height: 1.7;
            font-size: 15px;
        }
        .qa-card .question-header {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }
        .qa-card .question-text {
            font-size: 15px;
            word-break: break-word;
        }
        .qa-card .card-answer {
            display: none;
            margin-top: 12px;
            padding: 16px;
            background: #f9fafb;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            line-height: 1.7;
            font-size: 15px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .qa-card .card-answer.show {
            display: block;
        }
        .qa-card .card-footer {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            gap: 12px;
            flex-wrap: wrap;
        }
        .qa-card .card-actions {
            display: flex;
            justify-content: flex-start;
            gap: 8px;
            flex-wrap: wrap;
        }
        .qa-card .card-actions .btn-card,
        .pager .btn-nav {
            padding: 10px 14px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid var(--border);
            background: #fafafa;
            color: var(--muted);
            transition: background 0.15s ease, color 0.15s ease;
        }
        .qa-card .card-actions .btn-card:hover,
        .pager .btn-nav:hover {
            background: #f3f4f6;
            color: var(--text);
        }

        .pager {
            margin-top: 18px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .pager .btn-nav.disabled,
        .pager .btn-nav:disabled {
            background: #e5e7eb;
            color: #9ca3af;
            cursor: default;
        }
        .pager .page-info {
            color: var(--muted);
            font-size: 14px;
        }

        .empty {
            margin-top: 18px;
            background: var(--card);
            border: 1px dashed var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 28px;
            text-align: center;
            color: var(--muted);
        }

        .footer {
            color: var(--muted);
            text-align: center;
            padding: 18px 0;
            margin-top: 18px;
        }

        @media (max-width: 820px) {
            .pager {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div id="container">
        <div class="navbar">
            <h1>AI面试助手</h1>
            <div class="nav-actions">
                <a href="#" id="goHomeLink">返回首页</a>
                <a href="/login">登录</a>
            </div>
        </div>

        <p class="page-title">历史记录题目列表（每页 5 题）</p>
        <div class="search-bar">
            <input id="keywordInput" class="search-input" type="text" placeholder="输入关键词搜索题目">
            <button type="button" id="searchBtn" class="search-btn">搜索</button>
        </div>

        <div class="card-list" id="cardList"></div>
        <div class="empty" id="emptyBox" style="display: none;">暂无历史记录</div>

        <div class="pager" id="pager" style="display: none;">
            <button type="button" class="btn-nav btn-page-prev">上一页</button>
            <span class="page-info" id="pageInfo">第 1 / 1 页</span>
            <button type="button" class="btn-nav btn-page-next">下一页</button>
        </div>

        <footer class="footer">
            <p>以上内容为AI生成，仅供参考</p>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const navActions = document.querySelector('.nav-actions');
            if (navActions) {
                const token = localStorage.getItem('token');
                const username = localStorage.getItem('username');
                if (token && username) {
                    navActions.innerHTML = `
                        <a href="#" id="goHomeLink">返回首页</a>
                        <span style="color: rgba(255, 255, 255, 0.95); font-weight: 600;">Hello ${username}</span>
                        <a href="#" id="logoutLink">退出登录</a>
                    `;
                    const logoutLink = document.getElementById('logoutLink');
                    if (logoutLink) {
                        logoutLink.addEventListener('click', function (e) {
                            e.preventDefault();
                            localStorage.clear();
                            window.location.href = '/index';
                        });
                    }
                } else {
                    navActions.innerHTML = `
                        <a href="#" id="goHomeLink">返回首页</a>
                        <a href="/login">登录</a>
                    `;
                }
            }

            const goHomeLink = document.getElementById('goHomeLink');
            if (goHomeLink) {
                goHomeLink.addEventListener('click', function (e) {
                    e.preventDefault();
                    window.location.href = '/qa';
                });
            }

            const PAGE_SIZE = 5;
            const HISTORY_API_URL = '/api/user/history';
            const HISTORY_COUNT_API_URL = '/api/user/historycount';

            let responseData = [];
            let currentPage = 1;
            let totalPages = 1;
            let totalCount = 0;
            let currentKeyword = '';
            let lastSearchTotal = null;
            let lastSearchKeyword = '';

            const cardList = document.getElementById('cardList');
            const emptyBox = document.getElementById('emptyBox');
            const pager = document.getElementById('pager');
            const pageInfo = document.getElementById('pageInfo');
            const prevPageBtn = document.querySelector('.btn-page-prev');
            const nextPageBtn = document.querySelector('.btn-page-next');
            const keywordInput = document.getElementById('keywordInput');
            const searchBtn = document.getElementById('searchBtn');
            const searchBtnDefaultText = searchBtn ? searchBtn.textContent : '搜索';

            function setSearchLoading(isLoading) {
                if (!searchBtn) return;
                if (isLoading) {
                    searchBtn.disabled = true;
                    searchBtn.textContent = '搜索中...';
                } else {
                    searchBtn.disabled = false;
                    searchBtn.textContent = searchBtnDefaultText || '搜索';
                }
            }

            function escapeHtml(value) {
                return String(value == null ? '' : value)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            function getQuestionId(item) {
                if (!item) return '';
                const id = (item.question_id ?? item.questionId ?? item.qid ?? item.id);
                return id === null || id === undefined ? '' : id;
            }

            function normalizeItem(item) {
                return {
                    date: item && item.date ? String(item.date) : '',
                    question: item && item.question ? String(item.question) : '',
                    answer: item && (item.answer || item.ans) ? String(item.answer || item.ans) : '',
                    question_id: getQuestionId(item)
                };
            }

            function toValidTotal(value) {
                if (value === null || value === undefined || value === '') return NaN;
                const n = Number(value);
                return Number.isFinite(n) ? n : NaN;
            }

            function setCardFeedbackStyle(card, isStar, isHate) {
                if (!card) return;
                const starBtn = card.querySelector('.btn-star');
                const hateBtn = card.querySelector('.btn-hate');
                if (starBtn) {
                    starBtn.style.color = (Number(isStar) === 1) ? 'gold' : '';
                }
                if (hateBtn) {
                    hateBtn.style.color = (Number(isHate) === 1) ? 'red' : '';
                }
            }

            function fetchCardFeedbackState(item, card) {
                if (!card) return;
                const questionId = getQuestionId(item);
                const questionText = item && item.question ? item.question : '';
                if (!questionId && !questionText) return;
                const data = {
                    username: localStorage.getItem('username'),
                    is_search: 1,
                    question: questionText,
                    question_id: questionId
                };
                fetch('/api/user/searchstarhate', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + localStorage.getItem('token'),
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                })
                .then(function (response) { return response.json(); })
                .then(function (res) {
                    const values = res && Array.isArray(res.data) ? res.data : [0, 0];
                    setCardFeedbackStyle(card, values[0], values[1]);
                })
                .catch(function () {
                    setCardFeedbackStyle(card, 0, 0);
                });
            }

            function setPagerStatus() {
                pageInfo.textContent = `第 ${currentPage} / ${totalPages} 页，共 ${totalCount} 题`;
                const isFirst = currentPage <= 1;
                const isLast = currentPage >= totalPages;
                prevPageBtn.disabled = isFirst;
                nextPageBtn.disabled = isLast;
                prevPageBtn.classList.toggle('disabled', isFirst);
                nextPageBtn.classList.toggle('disabled', isLast);
            }

            function renderPage() {
                cardList.innerHTML = '';

                if (!responseData.length) {
                    emptyBox.style.display = '';
                    pager.style.display = 'none';
                    return;
                }

                emptyBox.style.display = 'none';
                pager.style.display = '';

                responseData.forEach(function (item, idx) {
                    const absoluteIndex = (currentPage - 1) * PAGE_SIZE + idx;
                    const card = document.createElement('div');
                    card.className = 'qa-card';
                    card.setAttribute('data-index', String(idx));
                    card.innerHTML = `
                        <div class="card-content">
                            <div class="question-header">
                                <span class="question-index">第${absoluteIndex + 1}题</span>
                                <span class="question-date">${escapeHtml(item.date || '')}</span>
                            </div>
                            <div class="question-text">${escapeHtml(item.question || '')}</div>
                        </div>
                        <div class="card-answer">${escapeHtml(item.answer || '')}</div>
                        <div class="card-footer">
                            <div class="card-actions">
                                <button type="button" class="btn-card btn-star">收藏⭐</button>
                                <button type="button" class="btn-card btn-view-answer">查看答案</button>
                                <button type="button" class="btn-card btn-hate">没用👎</button>
                            </div>
                        </div>
                    `;
                    cardList.appendChild(card);
                    card.setAttribute('data-question-id', item.question_id || '');
                    fetchCardFeedbackState(item, card);
                });

                setPagerStatus();
            }

            function getHistoryDataFromLocal() {
                let raw = [];
                try {
                    const saved = localStorage.getItem('history_data');
                    if (saved) {
                        raw = JSON.parse(saved);
                    }
                } catch (e) {
                    raw = [];
                }
                if (!Array.isArray(raw)) raw = [];
                return raw.map(normalizeItem).filter(function (item) {
                    return item.question || item.answer || item.date;
                });
            }

            function applyLocalData(page, serverTotal, pageData) {
                const hasPageData = Array.isArray(pageData);
                const list = hasPageData
                    ? pageData.map(normalizeItem).filter(function (item) {
                        return item.question || item.answer || item.date;
                    })
                    : getHistoryDataFromLocal();

                totalCount = toValidTotal(serverTotal);
                const keywordText = String(currentKeyword || '').trim();
                const hasKeyword = Boolean(keywordText);
                if (!Number.isFinite(totalCount) || totalCount < 0) {
                    if (hasKeyword) {
                        if (lastSearchKeyword === keywordText && lastSearchTotal !== null && lastSearchTotal !== undefined) {
                            const cachedSearchTotal = Number(lastSearchTotal);
                            if (Number.isFinite(cachedSearchTotal) && cachedSearchTotal >= 0) {
                                totalCount = cachedSearchTotal;
                            }
                        }
                    } else {
                        const localTotal = Number(localStorage.getItem('history_total_count'));
                        if (Number.isFinite(localTotal) && localTotal >= 0) {
                            totalCount = localTotal;
                        }
                    }
                }
                if (!Number.isFinite(totalCount) || totalCount < 0) {
                    totalCount = list.length;
                }

                totalPages = Math.max(1, Math.ceil(totalCount / PAGE_SIZE));
                currentPage = Math.min(Math.max(1, Number(page) || 1), totalPages);
                if (hasPageData) {
                    responseData = list;
                } else {
                    const start = (currentPage - 1) * PAGE_SIZE;
                    responseData = list.slice(start, start + PAGE_SIZE);
                }
                renderPage();
            }

            function fetchHistoryPage(page, keyword, knownTotal) {
                const safePage = Math.max(1, Number(page) || 1);
                const searchText = (keyword === undefined || keyword === null)
                    ? currentKeyword
                    : String(keyword).trim();
                currentKeyword = searchText;
                if (searchText) {
                    const safeKnownTotal = toValidTotal(knownTotal);
                    if (Number.isFinite(safeKnownTotal)) {
                        lastSearchTotal = safeKnownTotal;
                        lastSearchKeyword = searchText;
                    }
                } else {
                    lastSearchTotal = null;
                    lastSearchKeyword = '';
                }
                setSearchLoading(true);

                const payload = {
                    username: localStorage.getItem('username'),
                    page: safePage,
                    search: searchText
                };

                return fetch(HISTORY_API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + localStorage.getItem('token'),
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                })
                .then(function (res) {
                    if (!res.ok) throw new Error('HTTP状态码: ' + res.status);
                    return res.json();
                })
                .then(function (resp) {
                    if (resp && resp.msg === 'success') {
                        const answers = Array.isArray(resp.answers) ? resp.answers : [];
                        try {
                            localStorage.setItem('history_data', JSON.stringify(answers));
                        } catch (e) {}
                        const totalFromResp = Number(
                            resp.count != null ? resp.count :
                            (resp.total != null ? resp.total :
                            (resp.totalCount != null ? resp.totalCount : NaN))
                        );
                        if (Number.isFinite(totalFromResp) && totalFromResp >= 0) {
                            localStorage.setItem('history_total_count', String(totalFromResp));
                        }
                        const fallbackTotal = toValidTotal(knownTotal);
                        const finalTotal = Number.isFinite(totalFromResp) ? totalFromResp : fallbackTotal;
                        if (Number.isFinite(finalTotal)) {
                            if (currentKeyword) {
                                lastSearchTotal = finalTotal;
                                lastSearchKeyword = String(currentKeyword).trim();
                            }
                        }
                        applyLocalData(safePage, finalTotal, answers);
                    } else {
                        applyLocalData(safePage, toValidTotal(knownTotal));
                    }
                })
                .catch(function () {
                    applyLocalData(safePage, toValidTotal(knownTotal));
                })
                .finally(function () {
                    setSearchLoading(false);
                });
            }

            function fetchHistoryCount(keyword) {
                const payload = {
                    username: localStorage.getItem('username'),
                    search: keyword ? String(keyword) : ''
                };
                return fetch(HISTORY_COUNT_API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + localStorage.getItem('token'),
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                })
                .then(function (res) {
                    if (!res.ok) throw new Error('HTTP状态码: ' + res.status);
                    return res.json();
                })
                .then(function (resp) {
                    const dataObj = resp && typeof resp.data === 'object' ? resp.data : null;
                    const raw = resp && (
                        resp.count != null ? resp.count :
                        (resp.total != null ? resp.total :
                        (resp.totalCount != null ? resp.totalCount :
                        (dataObj && dataObj.count != null ? dataObj.count :
                        (dataObj && dataObj.total != null ? dataObj.total :
                        (dataObj && dataObj.totalCount != null ? dataObj.totalCount : resp.data)))))
                    );
                    const count = Number(raw);
                    if (Number.isFinite(count) && count >= 0) {
                        localStorage.setItem('history_total_count', String(count));
                        return count;
                    }
                    throw new Error('historycount 响应缺少有效总数');
                })
                .catch(function () {
                    const cached = Number(localStorage.getItem('history_total_count'));
                    return Number.isFinite(cached) && cached >= 0 ? cached : null;
                });
            }

            function postQuestionFeedback(item, actionType, card) {
                if (actionType !== 'star' && actionType !== 'hate') return Promise.resolve();
                if (!item) return Promise.resolve();
                const questionId = getQuestionId(item);
                const questionText = item.question || '';
                if (!questionId && !questionText) return Promise.resolve();

                const data = {
                    username: localStorage.getItem('username'),
                    feedback: actionType,
                    question: questionText,
                    question_id: questionId
                };

                return fetch('/api/user/sendfeedback', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + localStorage.getItem('token'),
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                })
                .then(function (response) { return response.json(); })
                .then(function (res) {
                    if (!card) return;
                    if (actionType === 'star') {
                        const value = Number(res && res.data);
                        const starBtn = card.querySelector('.btn-star');
                        if (starBtn) {
                            starBtn.style.color = (value === 1) ? 'gold' : '';
                        }
                    }
                    if (actionType === 'hate') {
                        const value = Number(res && res.data);
                        const hateBtn = card.querySelector('.btn-hate');
                        if (hateBtn) {
                            hateBtn.style.color = (value === 1) ? 'red' : '';
                        }
                    }
                    return res;
                })
                .catch(function (err) {
                    console.error('反馈上报失败:', err);
                });
            }

            cardList.addEventListener('click', function (e) {
                const viewBtn = e.target.closest('.btn-view-answer');
                if (viewBtn) {
                    const card = viewBtn.closest('.qa-card');
                    if (!card) return;
                    const answerBox = card.querySelector('.card-answer');
                    if (!answerBox) return;
                    if (answerBox.classList.contains('show')) {
                        answerBox.classList.remove('show');
                        viewBtn.textContent = '查看答案';
                    } else {
                        answerBox.classList.add('show');
                        viewBtn.textContent = '收起答案';
                    }
                    return;
                }

                const starBtn = e.target.closest('.btn-star');
                if (starBtn) {
                    const card = starBtn.closest('.qa-card');
                    const idx = card ? Number(card.getAttribute('data-index')) : -1;
                    const item = idx >= 0 ? responseData[idx] : null;
                    postQuestionFeedback(item, 'star', card);
                    return;
                }

                const hateBtn = e.target.closest('.btn-hate');
                if (hateBtn) {
                    const card = hateBtn.closest('.qa-card');
                    const idx = card ? Number(card.getAttribute('data-index')) : -1;
                    const item = idx >= 0 ? responseData[idx] : null;
                    postQuestionFeedback(item, 'hate', card);
                }
            });

            prevPageBtn.addEventListener('click', function () {
                if (currentPage <= 1) return;
                const keywordText = String(currentKeyword || '').trim();
                const knownTotal = (keywordText && lastSearchKeyword === keywordText) ? lastSearchTotal : null;
                fetchHistoryPage(currentPage - 1, currentKeyword, knownTotal);
            });

            nextPageBtn.addEventListener('click', function () {
                if (currentPage >= totalPages) return;
                const keywordText = String(currentKeyword || '').trim();
                const knownTotal = (keywordText && lastSearchKeyword === keywordText) ? lastSearchTotal : null;
                fetchHistoryPage(currentPage + 1, currentKeyword, knownTotal);
            });

            searchBtn.addEventListener('click', function () {
                const keyword = keywordInput ? keywordInput.value : '';
                setSearchLoading(true);
                fetchHistoryCount(keyword).then(function (count) {
                    lastSearchTotal = count;
                    lastSearchKeyword = String(keyword || '').trim();
                    fetchHistoryPage(1, keyword, count);
                }).catch(function () {
                    fetchHistoryPage(1, keyword);
                });
            });

            if (keywordInput) {
                keywordInput.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        const keyword = keywordInput.value || '';
                        setSearchLoading(true);
                        fetchHistoryCount(keyword).then(function (count) {
                            lastSearchTotal = count;
                            lastSearchKeyword = String(keyword || '').trim();
                            fetchHistoryPage(1, keyword, count);
                        }).catch(function () {
                            fetchHistoryPage(1, keyword);
                        });
                    }
                });
            }

            fetchHistoryCount().finally(function () {
                fetchHistoryPage(1, '');
            });
        });
    </script>
