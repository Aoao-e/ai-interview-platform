<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI面试助手 - 问答</title>
    <style>
        :root {
            --bg: #f6f7fb;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --border: #e5e7eb;
            --primary: #6366f1;
            --primary-600: #4f46e5;
            --shadow: 0 10px 30px rgba(17, 24, 39, 0.08);
            --radius: 14px;
            --font: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            color: var(--text);
            background: radial-gradient(1200px 600px at 15% 0%, #eef2ff 0%, transparent 60%),
                        radial-gradient(1200px 600px at 85% 10%, #fce7f3 0%, transparent 55%),
                        var(--bg);
            font-family: var(--font);
        }

        body, h1, a, label, p, input, select, textarea, button, option {
            font-family: var(--font);
        }

        /* 导航栏样式 */
        .navbar {
            background: linear-gradient(135deg, #6d28d9 0%, #4f46e5 40%, #2563eb 100%);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            padding: 14px 16px;
            align-items: center;
        }
        .navbar h1 {
            margin: 0;
            font-weight: 800;
            color: white;
            letter-spacing: 0.5px;
            font-size: 18px;
        }
        .navbar .nav-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .navbar a {
            color: rgba(255, 255, 255, 0.95);
            text-decoration: none;
            padding: 8px 10px;
            border-radius: 10px;
            font-weight: 600;
        }
        .navbar a:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        /* 搜索表单样式 */
        .search-form {
            margin: 18px 0 0;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 30px 16px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 90px 1fr 90px 1fr 90px 1fr;
            gap: 30px 6px;
            align-items: center;
        }
        .form-grid .span-all {
            grid-column: 2 / -1;
        }
        .search-form label {
            color: var(--muted);
            font-weight: 600;
            text-align: right;
            justify-self: end;
        }
        .search-form input[type="text"], .search-form select, .search-form textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            outline: none;
            background: #fff;
            transition: border-color 120ms ease, box-shadow 120ms ease;
        }
        .search-form textarea {
            resize: vertical;
            min-height: 160px;
        }
        .search-form input[type="text"]:focus,
        .search-form select:focus,
        .search-form textarea:focus {
            border-color: rgba(99, 102, 241, 0.55);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.14);
        }
        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 14px;
        }
        .btn {
            border: 1px solid transparent;
            padding: 10px 14px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        .btn-primary:hover {
            background: var(--primary-600);
        }
        .btn.is-loading {
            position: relative;
            padding-right: 38px;
            cursor: default;
            opacity: 0.85;
        }
        .btn.is-loading::after {
            content: "";
            position: absolute;
            right: 12px;
            top: 50%;
            width: 14px;
            height: 14px;
            margin-top: -7px;
            border: 2px solid rgba(255, 255, 255, 0.55);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: btn-spin 0.9s linear infinite;
        }
        @keyframes btn-spin {
            to { transform: rotate(360deg); }
        }
        .btn-ghost {
            background: white;
            color: var(--text);
            border-color: var(--border);
        }
        .btn-ghost:hover {
            background: #f9fafb;
        }

        /* 卡片列表区域 */
        .card-list {
            margin-top: 18px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .qa-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .qa-card .card-content {
            color: var(--text);
            line-height: 1.7;
            font-size: 15px;
        }
        .qa-card .question-header {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 4px;
        }
        .qa-card .question-text {
            font-size: 15px;
        }
        .qa-card .card-answer {
            display: none;
            margin-top: 12px;
            padding: 16px;
            background: #f9fafb;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            line-height: 1.7;
            font-size: 15px;
        }
        .qa-card .card-answer.show {
            display: block;
        }
        .qa-card .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            gap: 12px;
        }
        .qa-card .card-actions {
            display: flex;
            justify-content: flex-start;
            gap: 8px;
        }
        .qa-card .card-actions .btn-card,
        .qa-card .card-nav .btn-nav {
            padding: 10px 14px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid var(--border);
            background: #fafafa;
            color: var(--muted);
            transition: background 0.15s ease, color 0.15s ease;
        }
        .qa-card .card-actions .btn-card:hover,
        .qa-card .card-nav .btn-nav:hover {
            background: #f3f4f6;
            color: var(--text);
        }
        .qa-card .card-nav {
            display: flex;
            gap: 8px;
        }
        .qa-card .card-nav .btn-nav.disabled,
        .qa-card .card-nav .btn-nav:disabled {
            background: #e5e7eb;
            color: #9ca3af;
            cursor: default;
        }

        /* 页脚样式 */
        .footer {
            color: var(--muted);
            text-align: center;
            padding: 18px 0;
            margin-top: 18px;
        }

        #container {
            max-width: 1100px;
            width: calc(100% - 32px);
            margin: 18px auto;
        }

        .page-title {
            margin: 16px 2px 6px;
            font-size: 16px;
            color: var(--muted);
        }

        @media (max-width: 820px) {
            .form-grid {
                grid-template-columns: 120px 1fr;
            }
            .form-grid .span-all {
                grid-column: 2 / -1;
            }
        }
    </style>
</head>
<body>
    <div id="container">
        <!-- 顶部导航栏 -->
        <div class="navbar">
            <h1>AI面试助手</h1>
            <div class="nav-actions">
                <a href="#" id="notebookLink">笔记本</a>
                <a href="#" id="historyLink">历史记录</a>
                <a href="/login">登录</a>
            </div>
        </div>

        <!-- 搜索表单区域 -->
        <form class="search-form" action="/search" method="post">
            <div class="form-grid">
                <label for="job">职位名称：</label>
                <input type="text" id="job" name="job" placeholder="请输入职位名称">

                <label for="tone">语气：</label>
                <select id="tone" name="tone">
                    <option value="1">专业</option>
                    <option value="2">学术</option>
                    <option value="3">对话式</option>
                </select>

                <label for="count">数量：</label>
                <input type="text" id="count" name="count" placeholder="请输入数量（1-10）">

                <label for="extraInfo">附加信息：</label>
                <textarea class="span-all" id="extraInfo" name="extraInfo" placeholder="请输入附加信息"></textarea>
            </div>

            <div class="form-actions">
                <button class="btn btn-primary" type="submit">生成</button>
                <button class="btn btn-ghost" type="reset">清空</button>
            </div>
        </form>

        <!-- 问答卡片列表 -->
        <div class="card-list" id="cardList">
            <!-- 示例卡片，后端数据会动态渲染到这里 -->
            <div class="qa-card">
                <div class="card-content">
                    <div class="question-header">
                        <span class="question-index"></span>
                    </div>
                    <div class="question-text">
                        点击生成以生成例题。
                    </div>
                </div>
                <div class="card-answer">Ciallo～(∠?ω< )⌒☆</div>
                <div class="card-footer">
                    <div class="card-actions">
                        <button type="button" class="btn-card btn-star">收藏⭐</button>
                        <button type="button" class="btn-card btn-view-answer">查看答案</button>
                        <button type="button" class="btn-card btn-hate">没用👎</button>
                    </div>
                    <div class="card-nav">
                        <button type="button" class="btn-nav btn-prev">上一题</button>
                        <button type="button" class="btn-nav btn-next">下一题</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 页脚版权区域 -->
        <footer class="footer">
            <p>以上内容为AI生成，仅供参考</p>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const navActions = document.querySelector('.nav-actions');
            if (!navActions) return;

            const token = localStorage.getItem('token');
            const username = localStorage.getItem('username');

            if (token && username) {
                navActions.innerHTML = `
                    <a href="#" id="notebookLink">笔记本</a>
                    <a href="#" id="historyLink">历史记录</a>
                    <span style="color: rgba(255, 255, 255, 0.95); font-weight: 600;">Hello ${username}</span>
                    <a href="#" id="logoutLink">退出登录</a>
                `;

                const logoutLink = document.getElementById('logoutLink');
                if (logoutLink) {
                    logoutLink.addEventListener('click', function (e) {
                        e.preventDefault();
                        localStorage.clear();
                        window.location.href = '/index';
                    });
                }
            } else {
                navActions.innerHTML = `
                    <a href="#" id="notebookLink">笔记本</a>
                    <a href="#" id="historyLink">历史记录</a>
                    <a href="/login">登录</a>
                `;
            }

            const notebookLink = document.getElementById('notebookLink');
            if (notebookLink) {
                notebookLink.addEventListener('click', function (e) {
                    e.preventDefault();
                    const payload = {
                        username: localStorage.getItem('username'),
                        page: 1,
                        search: ''
                    };
                    const currentToken = localStorage.getItem('token');
                    const currentUsername = localStorage.getItem('username');

                    const countPromise = fetch('/api/user/notebookcount', {
                        method: 'POST',
                        headers: {
                            'Authorization': 'Bearer ' + currentToken,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ username: currentUsername })
                    })
                    .then(function (res) {
                        if (!res.ok) throw new Error('HTTP状态码: ' + res.status);
                        return res.json();
                    })
                    .then(function (resp) {
                        const raw = resp && (resp.count != null ? resp.count : (resp.total != null ? resp.total : (resp.totalCount != null ? resp.totalCount : resp.data)));
                        const count = Number(raw);
                        if (Number.isFinite(count)) {
                            localStorage.setItem('notebook_total_count', String(count));
                        }
                    })
                    .catch(function (err) {
                        console.error('获取笔记本总数失败:', err);
                    });

                    fetch('/api/user/notebook', {
                        method: 'POST',
                        headers: {
                            'Authorization': 'Bearer ' + localStorage.getItem('token'),
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    })
                    .then(function (res) {
                        if (!res.ok) throw new Error('HTTP状态码: ' + res.status);
                        return res.json();
                    })
                    .then(function (resp) {
                        if (resp && resp.msg === 'success') {
                            const answers = Array.isArray(resp.answers) ? resp.answers : [];
                            try {
                                localStorage.setItem('notebook_data', JSON.stringify(answers));
                            } catch (err) {}
                        } else {
                            console.log(resp);
                        }
                        return countPromise;
                    })
                    .catch(function (err) {
                        console.error('获取笔记本数据失败:', err);
                    })
                    .finally(function () {
                        window.location.href = '/notebook';
                    });
                });
            }

            const historyLink = document.getElementById('historyLink');
            if (historyLink) {
                historyLink.addEventListener('click', function (e) {
                    e.preventDefault();
                    const payload = {
                        username: localStorage.getItem('username'),
                        page: 1,
                        search: ''
                    };
                    const currentToken = localStorage.getItem('token');
                    const currentUsername = localStorage.getItem('username');

                    const countPromise = fetch('/api/user/historycount', {
                        method: 'POST',
                        headers: {
                            'Authorization': 'Bearer ' + currentToken,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ username: currentUsername })
                    })
                    .then(function (res) {
                        if (!res.ok) throw new Error('HTTP状态码: ' + res.status);
                        return res.json();
                    })
                    .then(function (resp) {
                        const raw = resp && (resp.count != null ? resp.count : (resp.total != null ? resp.total : (resp.totalCount != null ? resp.totalCount : resp.data)));
                        const count = Number(raw);
                        if (Number.isFinite(count)) {
                            localStorage.setItem('history_total_count', String(count));
                        }
                    })
                    .catch(function (err) {
                        console.error('获取历史记录总数失败:', err);
                    });

                    fetch('/api/user/history', {
                        method: 'POST',
                        headers: {
                            'Authorization': 'Bearer ' + localStorage.getItem('token'),
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    })
                    .then(function (res) {
                        if (!res.ok) throw new Error('HTTP状态码: ' + res.status);
                        return res.json();
                    })
                    .then(function (resp) {
                        if (resp && resp.msg === 'success') {
                            const answers = Array.isArray(resp.answers) ? resp.answers : [];
                            try {
                                localStorage.setItem('history_data', JSON.stringify(answers));
                            } catch (err) {}
                        } else {
                            console.log(resp);
                        }
                        return countPromise;
                    })
                    .catch(function (err) {
                        console.error('获取历史记录数据失败:', err);
                    })
                    .finally(function () {
                        window.location.href = '/history';
                    });
                });
            }

            // 从 index.html 保存的数据恢复表单
            try {
                const saved = localStorage.getItem('searchFormData');
                if (saved) {
                    const data = JSON.parse(saved);
                    const nameEl = document.getElementById('job');
                    const genderEl = document.getElementById('tone');
                    const countEl = document.getElementById('count');
                    const extraInfoEl = document.getElementById('extraInfo');
                    if (nameEl && typeof data.job === 'string') nameEl.value = data.job;
                    if (genderEl && data.tone != null) genderEl.value = String(data.tone);
                    if (countEl && typeof data.count === 'string') countEl.value = data.count;
                    if (extraInfoEl && typeof data.extraInfo === 'string') extraInfoEl.value = data.extraInfo;
                }
            } catch (e) {
                // ignore invalid JSON
            }

            // 校验数量：必须是 1-10 的整数
            (function bindCountValidator() {
                const countInput = document.getElementById('count');
                if (!countInput) return;

                function validate() {
                    const raw = countInput.value.trim();
                    const intPattern = /^[0-9]+$/;
                    const n = Number(raw);
                    if (!raw) return true;
                    if (!intPattern.test(raw) || n < 1 || n > 10) {
                        alert('数量必须是 1-10 的整数');
                        countInput.focus();
                        countInput.value = 1;
                        return false;
                    }
                    return true;
                }

                countInput.addEventListener('blur', validate);
            })();

            // 生成按钮逻辑：与 index 页面一致
            const form = document.querySelector('form.search-form');
            if (form) {
                form.addEventListener('submit', function (e) {
                    e.preventDefault();
                    
                    const generateBtn = form.querySelector('button[type=\"submit\"]');
                    const originalText = generateBtn ? generateBtn.textContent : '';
                    const updateGenerateText = function() {
                        const hasGenerated = localStorage.getItem('qa_generated') === '1';
                        if (generateBtn) generateBtn.textContent = hasGenerated ? '再次生成' : (originalText || '生成');
                    };
                    const setLoading = function(isLoading) {
                        if (!generateBtn) return;
                        if (isLoading) {
                            generateBtn.disabled = true;
                            generateBtn.classList.add('is-loading');
                            generateBtn.textContent = '正在生成...';
                        } else {
                            generateBtn.disabled = false;
                            generateBtn.classList.remove('is-loading');
                            updateGenerateText();
                        }
                    };

                    const data = {
                        username: localStorage.getItem('username'),
                        job: (document.getElementById('job') || {}).value || '',
                        tone: (document.getElementById('tone') || {}).value || '',
                        count: (document.getElementById('count') || {}).value || '',
                        extraInfo: (document.getElementById('extraInfo') || {}).value || ''
                    };
                    localStorage.setItem('searchFormData', JSON.stringify(data));

                    const jobInput = document.getElementById('job');
                    const extraInfoInput = document.getElementById('extraInfo');
                    const countInput = document.getElementById('count');

                    // 职位名不能为空
                    if (!data.job || !data.job.trim()) {
                        alert('职位名称不能为空');
                        if (jobInput) jobInput.focus();
                        return;
                    }

                    // 职位名称不超过 20 字
                    if (Array.from(data.job.trim()).length > 20) {
                        alert('职位名称不能超过20字');
                        if (jobInput) jobInput.focus();
                        return;
                    }

                    // 附加信息不超过 100 字
                    if (data.extraInfo && Array.from(data.extraInfo.trim()).length > 100) {
                        alert('附加信息不能超过100字');
                        if (extraInfoInput) extraInfoInput.focus();
                        return;
                    }

                    // 数量为空时自动置为 1
                    if (!data.count || !data.count.trim()) {
                        data.count = '1';
                        if (countInput) countInput.value = '1';
                    } else {
                        const intPattern = /^[0-9]+$/;
                        const n = Number(data.count);
                        if (!intPattern.test(data.count) || n < 1 || n > 10) {
                            alert('数量必须是 1-10 的整数');
                            if (countInput) countInput.focus();
                            return;
                        }
                    }

                    if (localStorage.getItem('token') === null) {
                        alert('请登录');
                        window.location.href = '/login';
                        return;
                    }

                    setLoading(true);
                    fetch('/api/user/sendquestion', {
                        method: 'POST',
                        headers: {
                            'Authorization': 'Bearer ' + localStorage.getItem('token'),
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(data)
                    })
                    .then(res => {
                        if (!res.ok) throw new Error('HTTP状态码: ' + res.status);
                        return res.json();
                    })
                    .then(resp => {
                        console.log(resp);
                        if(resp.msg==="正在生成中,请勿频繁点击...") {
                            alert("正在生成中,请勿频繁点击...");
                        }
                        else{ if (resp && resp.msg === 'success') {
                                // 如果后端返回题目列表，缓存起来供本页展示
                                if (resp.answers) {
                                    try {
                                        localStorage.setItem('response_data', JSON.stringify(resp.answers));
                                    } catch (e) {}
                                }
                                localStorage.setItem('qa_generated', '1');
                                alert('生成完成');
                                window.location.href = '/qa';
                            } else {
                                console.log(resp);
                            }
                        }
                    })
                    .catch(err => {
                        console.error('请求失败:', err);
                    })
                    .finally(function() {
                        setLoading(false);
                    });
                });
            }

            // 读取并展示后端返回的题目列表 response_data
            let responseData = [];
            let currentIndex = 0;

            function updateFeedbackColor(){
                const is_star = localStorage.getItem('is_star');
                const is_hate = localStorage.getItem('is_hate');
                setFeedbackColor(is_star, is_hate);
            }

            function setFeedbackColor(isStar, isHate) {
                const starBtn = document.querySelector('.btn-star');
                const hateBtn = document.querySelector('.btn-hate');
                if (starBtn) starBtn.style.color = (isStar == 1) ? "gold" : "";
                if (hateBtn) hateBtn.style.color = (isHate == 1) ? "red" : "";
            }

            function getFeedbackKey(item) {
                if (!item) return '';
                const id = (item.question_id ?? item.questionId ?? item.qid ?? item.id);
                const keyBase = (id !== null && id !== undefined && id !== '')
                    ? ('id_' + id)
                    : ('q_' + String(item.question || '').trim());
                return 'qa_feedback_' + keyBase;
            }

            function getCachedFeedback(item) {
                const key = getFeedbackKey(item);
                if (!key) return { star: 0, hate: 0 };
                try {
                    const raw = localStorage.getItem(key);
                    if (!raw) return { star: 0, hate: 0 };
                    const obj = JSON.parse(raw);
                    return {
                        star: Number(obj.star) ? 1 : 0,
                        hate: Number(obj.hate) ? 1 : 0
                    };
                } catch (e) {
                    return { star: 0, hate: 0 };
                }
            }

            function cacheFeedbackForItem(item, star, hate) {
                const key = getFeedbackKey(item);
                if (!key) return;
                try {
                    localStorage.setItem(key, JSON.stringify({
                        star: Number(star) ? 1 : 0,
                        hate: Number(hate) ? 1 : 0
                    }));
                } catch (e) {}
            }

            function applyCachedFeedback(item) {
                const cached = getCachedFeedback(item);
                localStorage.setItem('is_star', cached.star);
                localStorage.setItem('is_hate', cached.hate);
                updateFeedbackColor();
            }

            function syncFeedbackForCurrentQuestion() {
                if (!Array.isArray(responseData) || responseData.length === 0) return;
                const currentQuestion = responseData[currentIndex] || null;
                if (!currentQuestion) return;
                const questionId = (currentQuestion.question_id ?? currentQuestion.questionId ?? currentQuestion.qid ?? currentQuestion.id);
                const data = {
                    username: localStorage.getItem('username'),
                    is_search: 1,
                    question: currentQuestion.question,
                    question_id: questionId
                };
                fetch('/api/user/searchstarhate', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + localStorage.getItem('token'),
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                })
                .then(response => response.json())
                .then(res => {
                    if (!res || !res.data) return;
                    localStorage.setItem('is_star', res.data[0]);
                    localStorage.setItem('is_hate', res.data[1]);
                    cacheFeedbackForItem(currentQuestion, res.data[0], res.data[1]);
                    updateFeedbackColor();
                })
                .catch(err => {
                    console.error('同步收藏/点踩状态失败:', err);
                });
            }

            function loadResponseData() {
                let raw = null;
                if (Array.isArray(window.response_data)) {
                    raw = window.response_data;
                } else {
                    try {
                        const savedResp = localStorage.getItem('response_data');
                        if (savedResp) {
                            raw = JSON.parse(savedResp);
                        }
                    } catch (e) {
                        // ignore
                    }
                }
                if (Array.isArray(raw) && raw.length > 0) {
                    responseData = raw;
                    currentIndex = 0;
                    renderCurrentQA();
                    localStorage.setItem('qa_generated', '1');
                }
            }

            function renderCurrentQA() {
                if (!Array.isArray(responseData) || responseData.length === 0) return;
                const card = document.querySelector('.qa-card');
                if (!card) return;

                const item = responseData[currentIndex] || {};
                const questionId = getQuestionId(item);
                const contentEl = card.querySelector('.card-content');
                const indexEl = card.querySelector('.question-index');
                const textEl = card.querySelector('.question-text');
                const answerEl = card.querySelector('.card-answer');
                const prevBtn = card.querySelector('.btn-prev');
                const nextBtn = card.querySelector('.btn-next');
                const viewBtn = card.querySelector('.btn-view-answer');
                card.setAttribute('data-question-id', questionId || '');

                // 题号与题目文本
                let rawCount = (item.count ?? item.question_no ?? item.questionNo ?? item.index ?? item.no);
                if (rawCount === undefined || rawCount === null || rawCount === '') {
                    rawCount = currentIndex + 1;
                }
                const countLabel = `第${rawCount}题`;
                if (indexEl) {
                    indexEl.textContent = countLabel;
                }
                if (textEl) {
                    textEl.textContent = item.question || '';
                } else if (contentEl) {
                    contentEl.textContent = (countLabel ? countLabel + ' ' : '') + (item.question || '');
                }
                if (answerEl) {
                    const answerText = (item.ans ?? item.answer ?? item.solution ?? item.result);
                    answerEl.textContent = answerText || '';
                    answerEl.classList.remove('show'); // 默认不显示答案
                }
                if (viewBtn) viewBtn.textContent = '查看答案';

                const isFirst = currentIndex === 0;
                const isLast = currentIndex === responseData.length - 1;

                if (prevBtn) {
                    prevBtn.disabled = isFirst;
                    prevBtn.classList.toggle('disabled', isFirst);
                }
                if (nextBtn) {
                    nextBtn.disabled = isLast;
                    nextBtn.classList.toggle('disabled', isLast);
                }

                // 切题后先清空颜色，再同步当前题目的收藏/点踩状态
                setFeedbackColor(0, 0);
                applyCachedFeedback(item);
                syncFeedbackForCurrentQuestion();
            }

            function getQuestionId(item) {
                if (!item) return '';
                const id = (item.question_id ?? item.questionId ?? item.qid ?? item.id);
                return id === null || id === undefined ? '' : id;
            }

            // 上一题 / 下一题 切换
            (function bindNavButtons() {
                const card = document.querySelector('.qa-card');
                if (!card) return;
                const prevBtn = card.querySelector('.btn-prev');
                const nextBtn = card.querySelector('.btn-next');

                if (prevBtn) {
                    prevBtn.addEventListener('click', function () {
                        if (currentIndex <= 0) return;
                        currentIndex--;
                        renderCurrentQA();
                    });
                }
                if (nextBtn) {
                    nextBtn.addEventListener('click', function () {
                        if (!Array.isArray(responseData) || currentIndex >= responseData.length - 1) return;
                        currentIndex++;
                        renderCurrentQA();
                    });
                }
            })();
              function postQuestionFeedback(actionType) {
                if (actionType !== 'star' && actionType !== 'hate') return;
                if (!Array.isArray(responseData) || responseData.length === 0) return;

                const currentQuestion = responseData[currentIndex] || {};
                if (!currentQuestion || Object.keys(currentQuestion).length === 0) return;

                const questionId = getQuestionId(currentQuestion);
                
                
               console.log(currentQuestion.question);
                const data = {
                username: localStorage.getItem('username'),
                feedback: actionType,
                question: currentQuestion.question,
                question_id: questionId
            };
            

            
                
                

                fetch('/api/user/sendfeedback', {
                        method: 'POST',
                        headers: {
                            'Authorization': 'Bearer ' + localStorage.getItem('token'),
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(data)
                    })
                .then(response => response.json())
                .then(res => {
                    console.log("后台返回:", res);
                    if(actionType === 'star'){
                        
                        localStorage.setItem('is_star',res.data);}
                    
                    if(actionType === 'hate'){
                        localStorage.setItem('is_hate',res.data);}
                    updateFeedbackColor();
                    cacheFeedbackForItem(currentQuestion, actionType === 'star' ? res.data : getCachedFeedback(currentQuestion).star,
                        actionType === 'hate' ? res.data : getCachedFeedback(currentQuestion).hate);
                    if (actionType === 'hate') {
                        alert('已记录，系统将减少此类题目出现');
                    }
                }
            
                )
                .catch(err => {
                    console.error('反馈上报失败:', err);
                });
            }

            document.getElementById('cardList').addEventListener('click', function (e) {
                e.preventDefault();
                const starBtn = e.target.closest('.btn-star');
                if (starBtn) {
                    postQuestionFeedback('star');
                    return;
                }

                const hateBtn = e.target.closest('.btn-hate');
                if (hateBtn) {
                    postQuestionFeedback('hate');
                }
            });

            // 查看答案按钮：点击切换答案文本框显示
            document.getElementById('cardList').addEventListener('click', function(e) {
                const btn = e.target.closest('.btn-view-answer');
                if (!btn) return;
                const card = btn.closest('.qa-card');
                const answerBox = card.querySelector('.card-answer');
                if (answerBox.classList.contains('show')) {
                    answerBox.classList.remove('show');
                    btn.textContent = '查看答案';
                } else {
                    answerBox.classList.add('show');
                    btn.textContent = '收起答案';
                }
            });

            // 预留：从后端获取数据并渲染卡片的逻辑
            // function renderCards(data) { ... }

            // 初始化加载题目列表
            loadResponseData();
            (function updateGenerateButtonOnLoad() {
                const generateBtn = document.querySelector('form.search-form button[type="submit"]');
                if (!generateBtn) return;
                const hasGenerated = localStorage.getItem('qa_generated') === '1';
                generateBtn.textContent = hasGenerated ? '再次生成' : '生成';
            })();
        });
    </script>
</body>
</html>
