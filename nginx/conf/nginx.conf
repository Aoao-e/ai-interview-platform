
#user  nobody;
worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;
        server_name localhost;

        location /api/ {
        proxy_pass http://127.0.0.1:8080/;
        }
        location = / {
        root html;
        index index.html;
        } 
        location = /index {
            root html;
            try_files /index.html =404;
        }

        location = /login {
            root html;
            try_files /login/login.html =404;
        }

        location = /qa {
            root html;
            try_files /qa.html =404;
        }
        location = /register {
            root html;
            try_files /login/register.html =404;
        }
        location = /history {
            root html;
            try_files /history.html =404;
        }
        location = /notebook {
            root html;
            try_files /notebook.html =404;
        }
        location = /forget {
            root html;
            try_files /login/forget.html =404;
        }
        location = /admin {
            root html;
            try_files /admin.html =404;
        }
}

}
