<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>重置密码</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.register-container{
background:white;
border-radius:10px;
box-shadow:0 15px 35px rgba(0,0,0,0.1);
padding:40px;
width:100%;
max-width:400px;
}

.register-header{
text-align:center;
margin-bottom:30px;
}

.register-header h1{
color:#333;
font-size:28px;
margin-bottom:10px;
}

.register-header p{
color:#666;
font-size:14px;
}

.input-group{
margin-bottom:20px;
}

.input-group-code{
margin-bottom:20px;
}

.input-group label,
.input-group-code label{
display:block;
margin-bottom:8px;
color:#333;
font-weight:500;
font-size:14px;
}

.input-group input{
width:100%;
padding:12px 15px;
border:1px solid #ddd;
border-radius:5px;
font-size:16px;
transition:border-color .3s ease;
}

.input-group-code input{
width:65%;
padding:12px 15px;
border:1px solid #ddd;
border-radius:5px;
font-size:16px;
}

.input-group input:focus,
.input-group-code input:focus{
outline:none;
border-color:#667eea;
box-shadow:0 0 0 2px rgba(102,126,234,0.2);
}

#reset-button{
width:100%;
padding:12px;
background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
color:white;
border:none;
border-radius:5px;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:transform .2s ease,box-shadow .2s ease;
}

#sendVerificationCodeBtn{
width:33%;
padding:12px;
background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
color:white;
border:none;
border-radius:5px;
font-size:14px;
font-weight:600;
cursor:pointer;
}

#sendVerificationCodeBtn:active{
transform:none;
}

#sendVerificationCodeBtn.disabled{
background:#9ca3af;
cursor:not-allowed;
font-size:14px;
font-weight:600;
color:white;
}

#reset-button:hover{
transform:translateY(-2px);
box-shadow:0 5px 15px rgba(102,126,234,0.4);
}

.login-link{
text-align:center;
margin-top:20px;
}

.login-link a{
color:#667eea;
text-decoration:none;
font-size:14px;
font-weight:500;
}

.login-link a:hover{
color:#764ba2;
text-decoration:underline;
}
</style>

</head>

<body>

<div class="register-container">

<div class="register-header">
<h1>重置密码</h1>
<p>填写以下信息重置密码</p>
</div>

<form id="resetForm">

<div class="input-group">
<label for="username">用户名</label>
<input type="text" id="username" name="username" required placeholder="请输入用户名">
</div>

<div class="input-group-code">
<label>验证码</label>
<input type="text" id="VerificationCode" name="VerificationCode" required placeholder="请输入验证码">
<button type="button" id="sendVerificationCodeBtn">获取验证码</button>
</div>

<div class="input-group">
<label for="password">新密码</label>
<input type="password" id="password" name="password" required placeholder="请输入新密码">
</div>

<div class="input-group">
<label for="confirmPassword">确认密码</label>
<input type="password" id="confirmPassword" name="confirmPassword" required placeholder="请再次输入新密码">
</div>

<button type="submit" id="reset-button">重置密码</button>

</form>

<div class="login-link">
<a href="/login">返回登录</a>
</div>

</div>

<script>

document.getElementById('resetForm').addEventListener('submit',function(e){

e.preventDefault();

const username=document.getElementById('username').value;
const password=document.getElementById('password').value;
const VerificationCode=document.getElementById('VerificationCode').value;
const confirmPassword=document.getElementById('confirmPassword').value;

if(username.trim()===''||password.trim()===''||confirmPassword.trim()===''||VerificationCode.trim()===''){
alert('请填写所有必填字段');
return;
}

if(password.length<6){
alert('密码长度至少6位');
return;
}

if(password!==confirmPassword){
alert('两次输入的密码不一致');
return;
}

fetch("/api/forget",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username:username,
password:password,
VerificationCode:VerificationCode
})
})
.then(response=>response.json())
.then(data=>{

if(data.msg==="success"){
alert("重置成功，请登录");
window.location.href="/login";
}else{
alert("重置失败："+data.msg);
}

})
.catch(error=>{
console.error("请求失败:",error);
});

});

const sendCodeBtn=document.getElementById('sendVerificationCodeBtn');
let codeCountdownTimer=null;
const CODE_COUNTDOWN_KEY='forget_code_countdown_end';

function startCodeCountdown(seconds,endTime){
if(codeCountdownTimer){
clearInterval(codeCountdownTimer);
codeCountdownTimer=null;
}
let remaining=Number(seconds)||60;
let targetTime=endTime;
if(!Number.isFinite(targetTime)){
targetTime=Date.now()+remaining*1000;
}
try{
localStorage.setItem(CODE_COUNTDOWN_KEY,String(targetTime));
}catch(e){}
sendCodeBtn.disabled=true;
sendCodeBtn.classList.add('disabled');
sendCodeBtn.textContent='重新获取'+remaining;
codeCountdownTimer=setInterval(function(){
remaining=Math.ceil((targetTime-Date.now())/1000);
if(remaining<=0){
clearInterval(codeCountdownTimer);
codeCountdownTimer=null;
sendCodeBtn.disabled=false;
sendCodeBtn.classList.remove('disabled');
sendCodeBtn.textContent='获取验证码';
try{
localStorage.removeItem(CODE_COUNTDOWN_KEY);
}catch(e){}
return;
}
sendCodeBtn.textContent='重新获取'+remaining;
},1000);
}

function restoreCountdown(){
let stored=null;
try{
stored=localStorage.getItem(CODE_COUNTDOWN_KEY);
}catch(e){}
const endTime=Number(stored);
if(!Number.isFinite(endTime)){
return;
}
const remaining=Math.ceil((endTime-Date.now())/1000);
if(remaining>0){
startCodeCountdown(remaining,endTime);
}else{
try{
localStorage.removeItem(CODE_COUNTDOWN_KEY);
}catch(e){}
}
}

restoreCountdown();

sendCodeBtn.addEventListener('click',function(){

if(sendCodeBtn.disabled){
return;
}

const username=document.getElementById('username').value;

if(username.trim()===''){
alert('请先输入用户名');
return;
}

fetch("/api/getcode",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username:username,
is_forget: 1
})
})
.then(response=>response.json())
.then(data=>{

if(data.msg==="success"){
startCodeCountdown(60);
}else{
alert("发送失败："+data.msg);
}

})
.catch(error=>{
console.error("请求失败:",error);
});

});

</script>

</body>
</html>
